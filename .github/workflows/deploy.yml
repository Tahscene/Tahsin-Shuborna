name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Build project
        run: npm run build

      - name: Prepare GitHub Pages files
        run: |
          echo "Generated public files:"
          find .output/public -maxdepth 2 -type f | sort

          if [ ! -f ".output/public/_shell.html" ]; then
            echo "ERROR: .output/public/_shell.html was not generated."
            exit 1
          fi

          cp .output/public/_shell.html .output/public/index.html
          cp .output/public/_shell.html .output/public/404.html
          touch .output/public/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
